-->

    <script>
      (function () {
        const targetSelector =
          "#app > div > div > div > div.px-0.py-3.flex.justify-center";

        const removeElement = (parentElement) => {
          const observer = new MutationObserver((mutations) => {
            const element = document.querySelector(targetSelector);
            if (element) {
              element.remove();
              console.log("Branding removed.");
              // We don't disconnect if the widget re-renders the element later
            }
          });

          observer.observe(parentElement, { childList: true, subtree: true });
        };

        // Wait for the body to exist, then start watching
        if (document.body) {
          removeElement(document.body);
        } else {
          window.addEventListener("DOMContentLoaded", () =>
            removeElement(document.body),
          );
        }
      })();
    </script>
